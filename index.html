<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <!-- Primary -->
    <title>Fair Rent Canada — Free Rent Calculator for Canadian Renters</title>
    <meta name="description" content="See if your rent is fair. Free Canadian rent calculator for Ottawa, Toronto, and Vancouver. Compare your rent to real market data from CMHC and Rentals.ca. Anonymous, no account needed." />
    <meta name="robots" content="index, follow" />
    <link rel="canonical" href="https://fairrent.ca/" />

    <!-- Open Graph -->
    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://fairrent.ca/" />
    <meta property="og:site_name" content="Fair Rent Canada" />
    <meta property="og:title" content="Fair Rent Canada — Free Rent Calculator for Canadian Renters" />
    <meta property="og:description" content="Compare your rent to real market data across Canada. Free, anonymous, no account needed." />
    <meta property="og:image" content="https://fairrent.ca/og-fairrent.png" />
    <meta property="og:image:width" content="1200" />
    <meta property="og:image:height" content="630" />
    <meta property="og:locale" content="en_CA" />

    <!-- Twitter / X -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="Fair Rent Canada — Free Rent Calculator" />
    <meta name="twitter:description" content="See if your rent is fair. Free Canadian rent calculator for Ottawa, Toronto, and Vancouver." />
    <meta name="twitter:image" content="https://fairrent.ca/og-fairrent.png" />

    <!-- Schema -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "WebSite",
      "name": "Fair Rent Canada",
      "url": "https://fairrent.ca",
      "description": "Free rent calculator for Canadian renters. Compare your rent to real market data in Ottawa, Toronto, and Vancouver.",
      "potentialAction": {
        "@type": "SearchAction",
        "target": "https://fairrent.ca/?city={city}",
        "query-input": "required name=city"
      }
    }
    </script>

    <!-- Favicon -->
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <link rel="apple-touch-icon" href="/apple-touch-icon.png" />
    <meta name="theme-color" content="rgb(28, 26, 23)" />
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
